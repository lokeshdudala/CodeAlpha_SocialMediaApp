<!DOCTYPE html>
<html>
<head>
    <title>Login - SocialHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>SocialHub</h1>

            <h2>Welcome Back 👋</h2>

            <form id="loginForm">

               <input
    type="email"
    id="loginEmail"
    placeholder="Enter Email"
    required
>

<input
    type="password"
    id="loginPassword"
    placeholder="Enter Password"
    required
>

                <button type="submit">
                    Login
                </button>

            </form>

            <p class="auth-link">
                New User?
                <a href="register.html">
                    Register
                </a>
            </p>

        </div>

    </div>

    <script src="js/auth.js"></script>

</body>
</html>
